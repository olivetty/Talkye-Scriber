name: talkye-scriber
version: '0.6.4'
summary: Voice-to-text dictation for your desktop
description: |
  Hold a key, speak, release — text appears at your cursor.
  Talkye Scriber is a system-wide voice dictation tool that works
  in any application. Powered by whisper.cpp for offline speech
  recognition with support for 30+ languages.

title: Talkye Scriber
license: MIT
contact: contact@talkye.com
issues: https://github.com/olivetty/Talkye-Scriber/issues
source-code: https://github.com/olivetty/Talkye-Scriber
website: https://github.com/olivetty/Talkye-Scriber
grade: stable
confinement: strict
base: core22
compression: lzo

architectures:
  - build-on: amd64

apps:
  talkye-scriber:
    command: bin/talkye-scriber
    extensions: [gnome]
    plugs:
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - audio-playback
      - audio-record
      - network
      - home
    environment:
      LD_LIBRARY_PATH: $SNAP/opt/talkye-scriber/bin/lib:$SNAP/opt/talkye-scriber/sox/lib:$LD_LIBRARY_PATH
      TALKYE_WHISPER_BIN: $SNAP/opt/talkye-scriber/whisper/whisper-cli
      TALKYE_SIDECAR_DIR: $SNAP/opt/talkye-scriber/sidecar
      TALKYE_PYTHON: $SNAP/opt/talkye-scriber/python/bin/python3
      TALKYE_SOX: $SNAP/opt/talkye-scriber/sox/sox
      TALKYE_INSTALL_TYPE: snap

layout:
  /opt/talkye-scriber:
    bind: $SNAP/opt/talkye-scriber

parts:
  xdotool:
    plugin: make
    source: https://github.com/jordansissel/xdotool.git
    source-tag: v3.20211022.1
    make-parameters:
      - PREFIX=/usr
    build-packages:
      - libxtst-dev
      - libxinerama-dev
      - libxkbcommon-dev
    stage-packages:
      - libxtst6
      - libxinerama1

  xclip:
    plugin: autotools
    source: https://github.com/astrand/xclip.git
    source-tag: '0.13'
    build-packages:
      - libxmu-dev
    stage-packages:
      - libxmu6

  talkye-scriber:
    plugin: dump
    source: https://github.com/olivetty/Talkye-Scriber/releases/download/v0.6.4/talkye-scriber_0.6.4_amd64.deb
    source-type: deb
    override-stage: |
      # Only stage opt/ and usr/share/, skip usr/bin symlink that causes issues
      cp -a $CRAFT_PART_INSTALL/opt $CRAFT_STAGE/
      cp -a $CRAFT_PART_INSTALL/usr/share $CRAFT_STAGE/usr/ 2>/dev/null || true
    override-prime: |
      # Copy staged files
      cp -a $CRAFT_STAGE/opt $CRAFT_PRIME/ 2>/dev/null || true
      mkdir -p $CRAFT_PRIME/usr
      cp -a $CRAFT_STAGE/usr/share $CRAFT_PRIME/usr/ 2>/dev/null || true
      # Create launcher script
      mkdir -p $CRAFT_PRIME/bin
      printf '#!/bin/bash\nexec "$SNAP/opt/talkye-scriber/bin/talkye_app" "$@"\n' > $CRAFT_PRIME/bin/talkye-scriber
      chmod +x $CRAFT_PRIME/bin/talkye-scriber
